<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>The Iconic Four</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Cinzel:wght@400;600&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <p class="eyebrow">The Archive</p>
            <!-- CHANGE: subtitle above title -->
            <h1>The Iconic Four</h1>
            <!-- CHANGE: main title -->
            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-diamond"></div>
                <div class="divider-line right"></div>
            </div>
        </header>

        <div class="grid">
            <!-- CARD 1: Mephista -->
            <!-- CHANGE: update href to your character's folder e.g. "mephista/" -->
            <a class="card" href="mephista/">
                <div class="card-portrait">
                    <!-- CHANGE: replace placeholder div with an img tag when you have a portrait -->
                    <!-- e.g. <img src="mephista/Images/Mephi.jpg" alt="Mephista" /> -->
                    <div class="card-portrait-placeholder">✦</div>
                </div>
                <div class="card-overlay">
                    <span class="card-number">01</span>
                    <span class="card-name">Mephista</span>
                    <!-- CHANGE: character name -->
                    <span class="card-cta">Enter →</span>
                </div>
                <div class="card-corner"></div>
            </a>

            <!-- CARD 2: Noctis -->
            <a class="card" href="noctis/">
                <div class="card-portrait">
                    <div class="card-portrait-placeholder">✦</div>
                </div>
                <div class="card-overlay">
                    <span class="card-number">02</span>
                    <span class="card-name">Noctis</span>
                    <span class="card-cta">Enter →</span>
                </div>
                <div class="card-corner"></div>
            </a>

            <!-- CARD 3: Necro -->
            <a class="card" href="necro/">
                <div class="card-portrait">
                    <div class="card-portrait-placeholder">✦</div>
                </div>
                <div class="card-overlay">
                    <span class="card-number">03</span>
                    <span class="card-name">Necro</span>
                    <span class="card-cta">Enter →</span>
                </div>
                <div class="card-corner"></div>
            </a>

            <!-- CARD 4: Dark -->
            <a class="card" href="dark/">
                <div class="card-portrait">
                    <div class="card-portrait-placeholder">✦</div>
                </div>
                <div class="card-overlay">
                    <span class="card-number">04</span>
                    <span class="card-name">Dark</span>
                    <span class="card-cta">Enter →</span>
                </div>
                <div class="card-corner"></div>
            </a>
        </div>

        <footer>The Iconic Four &nbsp;·&nbsp; The Archive</footer>
        <!-- CHANGE: footer text -->

        <script src="script.js"></script>
    </body>
</html>
